<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TUB Fit - The Ultimate Bowl</title>
    <meta name="description" content="Fuel your fitness journey with precision macro bowls. Build your custom diet bowl and get it delivered fresh to your home or gym!">
    <meta property="og:title" content="TUB Fit - The Ultimate Bowl" />
    <meta property="og:description" content="Fuel your fitness journey with precision macro bowls. Build your custom diet bowl and get it delivered fresh to your home or gym!" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=800" />
    <meta property="og:url" content="https://tubfit.in" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WHATSAPP_NUMBER = "919560535741"; 
        const CALL_NUMBER = "+919560535741";
        const EMAIL_ADDRESS = "tubdelhi@outlook.com";
        const INSTAGRAM_HANDLE = "@tubfit.in";

        const menuData = {
          "Muscle Gain": [
            { id: "mg1", name: "The Fit Bowl", ingredients: "Chicken + Quinoa + Sauté Veg + Whole Egg + Lemon Juice + Olive Oil + Sesame Seeds", calories: 600, protein: 60, price: 179, image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=600", badges: ["Best Seller", "High Protein"] },
            { id: "mg2", name: "Grilled Chicken Bowl", ingredients: "Grilled Chicken + Egg + Brown Rice + Fresh Salad + Lemon Juice + Pumpkin Seeds", calories: 650, protein: 65, price: 179, image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=600", badges: ["Extra Protein"] },
            { id: "bk1", name: "Bulking Chicken Bowl", ingredients: "Chicken + White Rice + Avocado + Black Beans + Salad + Vegetable + Curd", calories: 750, protein: 55, price: 279, image: "https://images.unsplash.com/photo-1551432560-c1153f05b846?auto=format&fit=crop&q=80&w=600", badges: ["Calorie Dense"] },
            { id: "bk2", name: "Sweet Potato Bowl", ingredients: "Chicken + Sweet Potato + Brown Rice + Vegetable + Whole Egg + Curd + Almonds + Mix Seeds", calories: 780, protein: 60, price: 199, image: "https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?auto=format&fit=crop&q=80&w=600", badges: ["Complex Carbs"] },
            { id: "mg3", name: "Paneer Bowl", ingredients: "Paneer + Tofu + Quinoa + Sauté Veg + Olive Oil + Tomato Slice + Mix Seeds", calories: 680, protein: 55, price: 199, image: "https://images.unsplash.com/photo-1543339308-43e59d6b73a6?auto=format&fit=crop&q=80&w=600", badges: ["Vegetarian"] },
            { id: "bk3", name: "Paneer Bulking Bowl", ingredients: "Paneer + Brown Rice + Chickpea + Sautéed Vegetable + Soya Chunks + Almonds + Sesame Seeds", calories: 820, protein: 75, price: 229, image: "https://images.unsplash.com/photo-1588820875908-1cc022e37452?auto=format&fit=crop&q=80&w=600", badges: ["Vegetarian Bulk"] }
          ],
          "Fat Loss": [
            { id: "fl1", name: "Green Bowl", ingredients: "Lettuce + Cucumber + Broccoli + Chickpea + Lemon & Black Pepper Dressing + Mix Seeds", calories: 380, protein: 22, price: 99, image: "https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?auto=format&fit=crop&q=80&w=600", badges: ["Vegan", "Low Calorie"] },
            { id: "fl2", name: "Lean Chicken Bowl", ingredients: "Chicken + Lettuce + Cucumber + Tomato Slice + Olive Oil + Lemon + Spinach", calories: 450, protein: 60, price: 179, image: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&q=80&w=600", badges: ["Keto Friendly"] },
            { id: "fl3", name: "Lean Veg Bowl (Tofu Fiber)", ingredients: "Tofu + Quinoa + Sauté Vegetable + Mix Seeds + Lettuce + Cherry Tomato", calories: 420, protein: 35, price: 169, image: "https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&q=80&w=600", badges: ["Vegan", "High Fiber"] }
          ],
          "Max Protein": [
            { id: "mp1", name: "100gm Protein Chicken Bowl", ingredients: "Chicken Breast + Whole Egg + Fresh Salad + White Rice", calories: 850, protein: 100, price: 299, image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=600", badges: ["100g Protein", "Beast Mode"] },
            { id: "mp2", name: "100gm Protein Veg Bowl", ingredients: "Paneer + Tofu + Soya Chunks + Fresh Salad", calories: 820, protein: 100, price: 299, image: "https://images.unsplash.com/photo-1543339308-43e59d6b73a6?auto=format&fit=crop&q=80&w=600", badges: ["100g Protein", "Veg Max"] }
          ],
          "Premium Salads": [
            { id: "sl1", name: "Avocado & Chickpea Salad", ingredients: "Avocado + Chickpea + Lettuce + Cherry Tomatoes + Olive Oil Dressing", calories: 350, protein: 12, price: 249, image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=600", badges: ["Fresh", "Vegan"] },
            { id: "sl2", name: "Grilled Chicken Caesar", ingredients: "Grilled Chicken + Romaine Lettuce + Parmesan + Croutons + Caesar Dressing", calories: 420, protein: 35, price: 279, image: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?auto=format&fit=crop&q=80&w=600", badges: ["High Protein"] },
            { id: "sl3", name: "Mediterranean Paneer", ingredients: "Paneer + Cucumber + Olives + Red Onion + Feta + Vinaigrette", calories: 380, protein: 18, price: 259, image: "https://images.unsplash.com/photo-1529312266112-b33cf47d5fa6?auto=format&fit=crop&q=80&w=600", badges: ["Keto Friendly"] }
          ],
          "Guilt-Free Add-ons": [
            { id: "gf1", name: "Whey Protein Berry Smoothie", ingredients: "Isolate Whey + Mixed Berries + Almond Milk (No Sugar)", calories: 180, protein: 25, price: 149, image: "https://images.unsplash.com/photo-1556881286-fc6915169721?auto=format&fit=crop&q=80&w=600", badges: ["Coming Soon"], upcoming: true },
            { id: "gf2", name: "Citrus Detox Water", ingredients: "Lemon + Mint + Cucumber + Chia Seeds", calories: 15, protein: 0, price: 69, image: "https://images.unsplash.com/photo-1513428801552-870a48555e74?auto=format&fit=crop&q=80&w=600", badges: ["Coming Soon"], upcoming: true },
            { id: "gf3", name: "Keto Almond Brownie", ingredients: "Almond Flour + Dark Chocolate + Stevia + Whey Protein", calories: 210, protein: 12, price: 129, image: "https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62?auto=format&fit=crop&q=80&w=600", badges: ["Coming Soon"], upcoming: true }
          ]
        };

        const builderIngredients = {
          goals: [{ id: 'g1', name: 'Muscle Gain 💪', value: 'Muscle Gain' }, { id: 'g2', name: 'Fat Loss 🔥', value: 'Fat Loss' }, { id: 'g3', name: 'Salad 🥗', value: 'Salad' }],
          bases: [{ id: 'b1', name: 'Brown Rice', price: 0, calories: 110, protein: 3, carbs: 23, fats: 1 }, { id: 'b2', name: 'Quinoa', price: 0, calories: 120, protein: 4, carbs: 21, fats: 2 }, { id: 'b3', name: 'Fresh Salad', price: 0, calories: 20, protein: 1, carbs: 4, fats: 0 }],
          proteins: [{ id: 'p1', name: 'Chicken', price: 40, calories: 165, protein: 31, carbs: 0, fats: 3.5 }, { id: 'p2', name: 'Paneer', price: 30, calories: 296, protein: 18, carbs: 3, fats: 20 }, { id: 'p3', name: 'Tofu', price: 25, calories: 144, protein: 15, carbs: 3, fats: 8 }, { id: 'p4', name: 'Egg', price: 20, calories: 155, protein: 13, carbs: 1, fats: 10 }],
          extras: [{ id: 'e1', name: 'Seeds / Nuts', price: 15, calories: 50, protein: 2, carbs: 2, fats: 4 }, { id: 'e2', name: 'Broccoli', price: 15, calories: 30, protein: 2, carbs: 6, fats: 0 }, { id: 'e3', name: 'Sweet Potato', price: 20, calories: 86, protein: 2, carbs: 20, fats: 0 }, { id: 'e4', name: 'Avocado', price: 40, calories: 160, protein: 2, carbs: 8, fats: 14 }, { id: 'e5', name: 'Olive Oil', price: 15, calories: 119, protein: 0, carbs: 0, fats: 14 }]
        };

        function App() {
          const [activeMenuTab, setActiveMenuTab] = useState("Muscle Gain");
          const scrollContainerRef = useRef(null);
          const tabsContainerRef = useRef(null);
          const isTabClicking = useRef(false);
          const categories = Object.keys(menuData);
          
          const [cart, setCart] = useState([]);
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [isCheckoutStep, setIsCheckoutStep] = useState(false);
          const [toast, setToast] = useState({ message: '', visible: false });
          const [userDetails, setUserDetails] = useState({ name: '', phone: '', deliveryType: 'home', address: '' });
          
          const BASE_BOWL_PRICE = 199;
          const [currentStepIndex, setCurrentStepIndex] = useState(0);
          const [buildGoal, setBuildGoal] = useState([]);
          const [buildBase, setBuildBase] = useState([]);
          const [buildProtein, setBuildProtein] = useState([]);
          const [buildExtras, setBuildExtras] = useState([]);

          const [timeLeft, setTimeLeft] = useState("");

          // Lock background scrolling when cart modal is open
          useEffect(() => {
              if (isCartOpen) {
                  document.body.style.overflow = 'hidden';
              } else {
                  document.body.style.overflow = 'unset';
              }
              return () => { document.body.style.overflow = 'unset'; };
          }, [isCartOpen]);

          // FOMO Countdown Timer
          useEffect(() => {
              const timer = setInterval(() => {
                  const now = new Date();
                  const target = new Date();
                  target.setHours(22, 0, 0, 0); 
                  if (now > target) target.setDate(target.getDate() + 1); 
                  const diff = target - now;
                  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                  const s = Math.floor((diff % (1000 * 60)) / 1000);
                  setTimeLeft(`${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`);
              }, 1000);
              return () => clearInterval(timer);
          }, []);

          // Single-Track Smooth Scrolling Observer
          useEffect(() => {
            const container = scrollContainerRef.current;
            if (!container) return;

            const observer = new IntersectionObserver(
                (entries) => {
                    if (isTabClicking.current) return;

                    let maxRatio = 0;
                    let visibleCategory = null;

                    entries.forEach((entry) => {
                        if (entry.isIntersecting && entry.intersectionRatio > maxRatio) {
                            maxRatio = entry.intersectionRatio;
                            visibleCategory = entry.target.getAttribute('data-category');
                        }
                    });

                    if (visibleCategory && visibleCategory !== activeMenuTab) {
                        setActiveMenuTab(visibleCategory);
                        
                        if (tabsContainerRef.current) {
                            const activeTabElement = document.getElementById(`tab-${visibleCategory.replace(/[^a-zA-Z0-9]/g, '')}`);
                            if (activeTabElement) {
                                const tabContainer = tabsContainerRef.current;
                                const scrollLeft = activeTabElement.offsetLeft - (tabContainer.offsetWidth / 2) + (activeTabElement.offsetWidth / 2);
                                tabContainer.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                            }
                        }
                    }
                },
                { root: container, threshold: 0.6 }
            );

            const cards = container.querySelectorAll('.menu-card');
            cards.forEach(card => observer.observe(card));

            return () => observer.disconnect();
          }, [activeMenuTab]);

          const handleTabClick = (category) => {
              isTabClicking.current = true;
              setActiveMenuTab(category);
              
              if (tabsContainerRef.current) {
                  const activeTabElement = document.getElementById(`tab-${category.replace(/[^a-zA-Z0-9]/g, '')}`);
                  if (activeTabElement) {
                      const tabContainer = tabsContainerRef.current;
                      const scrollLeft = activeTabElement.offsetLeft - (tabContainer.offsetWidth / 2) + (activeTabElement.offsetWidth / 2);
                      tabContainer.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                  }
              }

              const targetElement = document.getElementById(`first-item-${category.replace(/[^a-zA-Z0-9]/g, '')}`);
              if (targetElement && scrollContainerRef.current) {
                  scrollContainerRef.current.scrollTo({
                      left: targetElement.offsetLeft - 16,
                      behavior: 'smooth'
                  });
              }

              setTimeout(() => { isTabClicking.current = false; }, 600);
          };

          const scrollMenu = (direction) => {
            if (scrollContainerRef.current) {
              const itemWidth = window.innerWidth < 640 ? window.innerWidth * 0.85 : 340;
              const gap = 24;
              const scrollAmount = itemWidth + gap;
              
              scrollContainerRef.current.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
            }
          };

          const showToast = (message) => {
              setToast({ message, visible: true });
              setTimeout(() => setToast({ message: '', visible: false }), 3000);
          };

          const addToCart = (item, isCustom = false, customDetails = null) => {
              const newItem = {
                  id: Math.random().toString(36).substr(2, 9),
                  name: isCustom ? "Custom Fitness Bowl" : item.name,
                  price: isCustom ? item.price : item.price,
                  image: isCustom ? "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=150" : item.image,
                  isCustom,
                  customDetails
              };
              setCart([...cart, newItem]);
              showToast(`${newItem.name} added to cart!`);
          };

          const removeFromCart = (indexToRemove) => {
              setCart(cart.filter((_, idx) => idx !== indexToRemove));
              if(cart.length === 1) setIsCheckoutStep(false); 
          };

          const finalizeOrder = (e) => {
              e.preventDefault();
              if (!userDetails.name || !userDetails.phone || !userDetails.address) return;
              
              let message = `*New Order from TUB Fit*\n\n`;
              message += `*Customer Details:*\n👤 Name: ${userDetails.name}\n📱 Phone: ${userDetails.phone}\n📍 Delivery To: ${userDetails.deliveryType.toUpperCase()}\n🏠 Address/Location: ${userDetails.address}\n\n`;
              message += `*Order Items:*\n`;
              
              let total = 0;
              cart.forEach((item, idx) => {
                  message += `${idx + 1}. *${item.name}* (₹${item.price})\n`;
                  if(item.isCustom) message += `   _${item.customDetails.replace(/\n/g, ' ')}_\n`;
                  total += item.price;
              });
              message += `\n*Total Amount: ₹${total}*`;
              
              window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
              setIsCartOpen(false);
              setCart([]);
              setIsCheckoutStep(false);
          };

          const openSubscription = (planName) => {
              const msg = `Hi TUB Fit! I am interested in subscribing to the *${planName}*. Please share the details!`;
              window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
          };

          const getFreeDietPlan = () => {
              const msg = `Hi TUB Fit! I'd love to get the Free 7-Day Shred Diet Plan! 🥗`;
              window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
          };

          const toggleSelection = (stateArray, setState, item) => {
            if (stateArray.some(i => i.id === item.id)) setState(stateArray.filter(i => i.id !== item.id));
            else setState([...stateArray, item]);
          };
          const selectSingle = (stateArray, setState, item) => setState([item]); 

          const calculateCustomTotals = () => {
            const items = [...buildBase, ...buildProtein, ...buildExtras];
            return items.reduce((acc, item) => ({
              price: acc.price + item.price, calories: acc.calories + item.calories, protein: acc.protein + item.protein, carbs: acc.carbs + item.carbs, fats: acc.fats + item.fats,
            }), { price: BASE_BOWL_PRICE, calories: 0, protein: 0, carbs: 0, fats: 0 }); 
          };
          const totals = calculateCustomTotals();

          const handleAddCustomToCart = () => {
            const items = [...buildBase, ...buildProtein, ...buildExtras];
            const itemNames = items.length > 0 ? items.map(i => i.name).join(", ") : "Standard Base Only";
            const goalText = buildGoal.length > 0 ? `Goal: ${buildGoal[0].name}` : "Goal: General Fitness";
            const details = `${goalText} | Ingredients: ${itemNames} | Macros: ${totals.calories} kcal, ${totals.protein}g P`;
            addToCart({ name: "Custom Bowl", price: totals.price }, true, details);
            setBuildBase([]); setBuildProtein([]); setBuildExtras([]); setBuildGoal([]); setCurrentStepIndex(0);
          };

          const steps = [
            { id: 'goal', title: "1. Select Goal", state: buildGoal, setStateFn: setBuildGoal, options: builderIngredients.goals, icon: "fas fa-bullseye", isSingle: true },
            { id: 'base', title: "2. Choose Base", state: buildBase, setStateFn: setBuildBase, options: builderIngredients.bases, icon: "fas fa-bowl-food", isSingle: false },
            { id: 'protein', title: "3. Choose Protein", state: buildProtein, setStateFn: setBuildProtein, options: builderIngredients.proteins, icon: "fas fa-dumbbell", isSingle: false },
            { id: 'extras', title: "4. Add Extras", state: buildExtras, setStateFn: setBuildExtras, options: builderIngredients.extras, icon: "fas fa-leaf", isSingle: false }
          ];

          return (
            <div className="bg-white text-gray-800 selection:bg-green-200 pb-20 md:pb-0 relative">
              
              {/* FOMO Countdown Banner */}
              <div className="bg-orange-500 text-white text-center py-2 px-4 text-xs sm:text-sm font-bold tracking-wide flex items-center justify-center gap-2">
                  <i className="fas fa-clock"></i>
                  <span>Order within {timeLeft} for guaranteed next-day morning delivery!</span>
              </div>

              {/* Toast Notification */}
              {toast.visible && (
                  <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-bounce whitespace-nowrap">
                      <i className="fas fa-check-circle text-green-400"></i>
                      <span className="font-medium text-sm">{toast.message}</span>
                  </div>
              )}

              {/* Cart Modal Overlay */}
              {isCartOpen && (
                  <div className="fixed inset-0 bg-black/60 z-[100] flex justify-end">
                      <div className="bg-white w-full md:w-[420px] h-full flex flex-col shadow-2xl animate-slide-in-right">
                          <div className="p-6 border-b flex justify-between items-center bg-gray-50">
                              <h3 className="font-bold text-xl text-gray-900">
                                  {isCheckoutStep ? "Delivery Details" : "Your Cart"}
                              </h3>
                              <button onClick={() => { setIsCartOpen(false); setIsCheckoutStep(false); }} className="text-gray-400 hover:text-gray-900 text-3xl leading-none">&times;</button>
                          </div>
                          
                          <div className="flex-1 overflow-y-auto p-6">
                              {cart.length === 0 ? (
                                  <div className="text-center text-gray-400 mt-20 flex flex-col items-center">
                                      <i className="fas fa-shopping-bag text-5xl mb-4 opacity-50"></i>
                                      <p>Your cart is empty</p>
                                      <button onClick={() => setIsCartOpen(false)} className="mt-6 px-6 py-2 bg-green-100 text-green-700 rounded-full font-semibold text-sm">Browse Menu</button>
                                  </div>
                              ) : !isCheckoutStep ? (
                                  <div className="space-y-4">
                                      {cart.map((item, idx) => (
                                          <div key={idx} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative flex gap-4 items-center">
                                              <img src={item.image} alt={item.name} className="w-16 h-16 rounded-xl object-cover shadow-sm" />
                                              <div className="flex-1 pr-8">
                                                  <h4 className="font-bold text-gray-900 text-sm leading-tight">{item.name}</h4>
                                                  <p className="text-green-600 font-bold text-sm mt-1">₹{item.price}</p>
                                                  {item.isCustom && <p className="text-[10px] text-gray-500 mt-1 leading-relaxed line-clamp-2">{item.customDetails}</p>}
                                              </div>
                                              <button onClick={() => removeFromCart(idx)} className="absolute top-4 right-4 text-red-300 hover:text-red-500 transition-colors bg-red-50 w-8 h-8 flex items-center justify-center rounded-full"><i className="fas fa-trash text-xs"></i></button>
                                          </div>
                                      ))}
                                      <div className="pt-6 mt-4 flex justify-between items-center">
                                          <span className="text-gray-500 font-medium">Total Amount</span>
                                          <span className="font-bold text-2xl text-gray-900">₹{cart.reduce((sum, item) => sum + item.price, 0)}</span>
                                      </div>
                                      <p className="text-center text-xs text-gray-500 mt-2 italic">Free delivery on orders above ₹299. Standard delivery fees apply below.</p>
                                  </div>
                              ) : (
                                  <form id="checkoutForm" onSubmit={finalizeOrder} className="space-y-5">
                                      <div>
                                          <label className="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                                          <input required type="text" className="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-500 transition-all" value={userDetails.name} onChange={e => setUserDetails({...userDetails, name: e.target.value})} placeholder="e.g. Rahul Sharma" />
                                      </div>
                                      <div>
                                          <label className="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                                          <input required type="tel" className="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-500 transition-all" value={userDetails.phone} onChange={e => setUserDetails({...userDetails, phone: e.target.value})} placeholder="+91 XXXXX XXXXX" />
                                      </div>
                                      <div>
                                          <label className="block text-sm font-semibold text-gray-700 mb-2">Delivery Location</label>
                                          <div className="flex gap-4 mb-3">
                                              <label className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border-2 cursor-pointer transition-all ${userDetails.deliveryType === 'home' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-gray-200 bg-white text-gray-500 hover:border-green-200'}`}>
                                                  <input type="radio" className="hidden" name="deliveryType" checked={userDetails.deliveryType === 'home'} onChange={() => setUserDetails({...userDetails, deliveryType: 'home'})} />
                                                  <i className="fas fa-home"></i> Home
                                              </label>
                                              <label className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border-2 cursor-pointer transition-all ${userDetails.deliveryType === 'gym' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-gray-200 bg-white text-gray-500 hover:border-green-200'}`}>
                                                  <input type="radio" className="hidden" name="deliveryType" checked={userDetails.deliveryType === 'gym'} onChange={() => setUserDetails({...userDetails, deliveryType: 'gym'})} />
                                                  <i className="fas fa-dumbbell"></i> Gym
